name: Sync Notion to Jekyll

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. 여기서부터 GH_PAT를 사용하도록 token 속성을 추가합니다.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }} # 🌟 핵심: 체크아웃부터 PAT 사용

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_IDS: ${{ secrets.DATABASE_IDS }}
        run: |
          python notion_to_jekyll.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add _posts/
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync posts from Notion"
            # 2. 이미 Checkout 단계에서 인증되었으므로, 복잡한 URL 설정 없이 바로 push 가능합니다.
            git push origin master 
          fi
